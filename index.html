<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>电缆铜排选型工具</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--acc:#58a6ff;--green:#3fb950;--warn:#d2991d;--muted:#8b949e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 12px}
#app{width:100%;max-width:540px;display:flex;flex-direction:column;gap:16px}
header{text-align:center;padding:6px 0}
header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--acc),#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
label.sl{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
.options-row{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{flex:1;min-width:55px;padding:10px 5px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;text-align:center;transition:all 0.15s;font-weight:500}
.opt-btn:hover{border-color:var(--acc);color:var(--text)}
.opt-btn.active{background:rgba(88,166,255,0.12);border-color:var(--acc);color:var(--acc)}
.type-btn{flex:1;min-width:70px;padding:12px 10px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-size:13px;cursor:pointer;text-align:center;font-weight:600;transition:all 0.2s}
.type-btn:hover{border-color:var(--acc)}
.type-btn.active.cu-type{border-color:#e6a832;background:rgba(230,168,50,0.08);color:#e6a832}
.type-btn.active.al-type{border-color:#a8b8c8;background:rgba(168,184,200,0.08);color:#a8b8c8}
.type-btn.active.bb-type{border-color:var(--acc);background:rgba(88,166,255,0.08);color:var(--acc)}
.hidden{display:none!important}
.input-row{display:flex;align-items:center;gap:10px}
.input-row input{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:22px;font-weight:700;outline:none;width:100%;transition:border 0.2s}
.input-row input:focus{border-color:var(--acc)}
.input-row .unit{color:var(--acc);font-size:16px;font-weight:600}
.result-card{border:2px solid var(--border);border-radius:14px;padding:16px 18px;margin-top:12px}
.result-card.cu-card{border-color:rgba(230,168,50,0.5);background:rgba(230,168,50,0.03)}
.result-card.al-card{border-color:rgba(168,184,200,0.5);background:rgba(168,184,200,0.03)}
.result-card.bb-card{border-color:rgba(88,166,255,0.5);background:rgba(88,166,255,0.03)}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rh .rt{font-size:13px;font-weight:600}.rh .rl{font-size:11px;color:var(--muted)}
.rm{display:flex;justify-content:space-between;align-items:flex-end}
.rm .sz{font-size:34px;font-weight:800}.rm .ap{font-size:15px;color:var(--muted)}
.ir{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}
.cu-card .rt,.cu-card .sz{color:#e6a832}
.al-card .rt,.al-card .sz{color:#a8b8c8}
.bb-card .rt,.bb-card .sz{color:var(--acc)}
.ref-table{width:100%;font-size:11px;border-collapse:collapse}
.ref-table th{text-align:left;color:var(--muted);font-weight:500;padding:6px 5px;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase}
.ref-table td{padding:5px 5px;border-bottom:1px solid rgba(255,255,255,0.04)}
.ref-table tr.hl td{color:var(--acc);font-weight:600;background:rgba(88,166,255,0.06)}
.note{color:var(--muted);font-size:11px;line-height:1.6;padding:10px 14px;background:rgba(210,153,29,0.05);border:1px solid rgba(210,153,29,0.12);border-radius:10px}
@media(max-width:400px){.rm .sz{font-size:26px}}
</style>
</head>
<body>
<div id="app">
<header><h1>⚡ 电缆 · 铜排选型工具</h1><p>GB 50217-2018 &nbsp;|&nbsp; GB 50054-2011</p></header>

<div class="card">
  <label class="sl">导体类型</label>
  <div class="options-row" id="type-opts">
    <button class="type-btn active cu-type" data-type="cu">🔶 铜电缆</button>
    <button class="type-btn al-type" data-type="al">🔘 铝电缆</button>
    <button class="type-btn bb-type" data-type="bb">🟦 铜排</button>
  </div>
  <div id="cable-opts">
    <label class="sl" style="margin-top:8px">电缆芯数</label>
    <div class="options-row" id="core-btns">
      <button class="opt-btn" data-val="1">单芯</button>
      <button class="opt-btn active" data-val="3">3芯</button>
      <button class="opt-btn" data-val="4">4芯</button>
      <button class="opt-btn" data-val="5">5芯</button>
    </div>
    <label class="sl" style="margin-top:6px">并联根数 ≤wbr≥(同一回路)</label>
    <div class="options-row" id="count-btns">
      <button class="opt-btn active" data-val="1">单根</button>
      <button class="opt-btn" data-val="2t">2根紧贴</button>
      <button class="opt-btn" data-val="2s">2根有距</button>
      <button class="opt-btn" data-val="3t">3根紧贴</button>
      <button class="opt-btn" data-val="3s">3根有距</button>
    </div>
    <label class="sl" style="margin-top:4px">敷设方式</label>
    <div class="options-row" id="method-btns">
      <button class="opt-btn active" data-val="air">空气中</button>
      <button class="opt-btn" data-val="pipe">穿管</button>
      <button class="opt-btn" data-val="buried">埋地</button>
    </div>
  </div>
  <div id="bb-opts" class="hidden">
    <label class="sl" style="margin-top:4px">敷设方式</label>
    <div class="options-row" id="bbm-btns">
      <button class="opt-btn active" data-val="open">户外架空</button>
      <button class="opt-btn" data-val="closed">户内封闭</button>
    </div>
  </div>
</div>

<div class="card">
  <label class="sl">计算电流</label>
  <div class="input-row"><input type="number" id="I" value="200" min="1" oninput="calc()"><span class="unit">A</span></div>
</div>

<div id="result"></div>

<div class="card">
  <div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 载流量参考表</div>
  <div style="overflow-x:auto" id="reftbl"></div>
</div>

<div class="note">
⚠️ <b>规范依据</b><br>
1. <b>GB 50217-2018 表D.0.5</b> — 空气中单层多根并行敷设校正系数：2根s=d→0.90, s=2d→1.00；3根s=d→0.85, s=2d→0.98<br>
2. <b>GB 50054-2011 §6.3.7</b> — 多根并联导体同型号/截面/长度/敷设方式时，载流量可按每根之和计<br>
3. 铝载流量 ≈ 铜 × 0.77；铝等效截面 ≈ 铜 × 1.6<br>
4. 大电流(≥400A)优先考虑铜排或并联方案
</div>
</div>

<script>
var C=[{s:1.5,a1:22,a3:18},{s:2.5,a1:30,a3:26},{s:4,a1:40,a3:35},{s:6,a1:50,a3:44},{s:10,a1:68,a3:60},{s:16,a1:90,a3:80},{s:25,a1:118,a3:105},{s:35,a1:145,a3:130},{s:50,a1:180,a3:160},{s:70,a1:225,a3:200},{s:95,a1:275,a3:245},{s:120,a1:320,a3:285},{s:150,a1:365,a3:325},{s:185,a1:415,a3:370},{s:240,a1:490,a3:435},{s:300,a1:560,a3:500}];
var BB=[{sp:'40×4',a:160,o:640,c:512},{sp:'50×5',a:250,o:950,c:760},{sp:'60×6',a:360,o:1250,c:1000},{sp:'80×8',a:640,o:1800,c:1440},{sp:'100×10',a:1000,o:2500,c:2000},{sp:'120×12',a:1440,o:3100,c:2480},{sp:'150×15',a:2250,o:4000,c:3200},{sp:'200×20',a:4000,o:5800,c:4640}];
var mf={air:1,pipe:0.72,buried:0.85}, cf={1:1,3:1,4:0.9,5:0.8};
// divMap: GB50217表D.0.5 并列系数×根数
var divMap={1:1,'2t':1.8,'2s':2,'3t':2.55,'3s':2.94};
function alA(cu){return Math.round(cu*0.77)}

var tp='cu', cr='3', mt='air', bb='open', ct='1';

function ao(id,cb){document.querySelectorAll('#'+id+' .opt-btn').forEach(function(b){b.addEventListener('click',function(){this.parentElement.querySelectorAll('.opt-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');cb(this.dataset.val);calc()})})}
document.querySelectorAll('#type-opts .type-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('#type-opts .type-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');tp=this.dataset.type;document.getElementById('cable-opts').classList.toggle('hidden',tp==='bb');document.getElementById('bb-opts').classList.toggle('hidden',tp!=='bb');calc()})});
ao('core-btns',function(v){cr=v});ao('method-btns',function(v){mt=v});ao('count-btns',function(v){ct=v});ao('bbm-btns',function(v){bb=v});

function cl(n){return{1:'单根','2t':'2根紧贴','2s':'2根有距','3t':'3根紧贴','3s':'3根有距'}[n]||''}
function cn_(n){return{1:1,'2t':2,'2s':2,'3t':3,'3s':3}[n]||1}
function cnote(n){return{'2t':'GB50217表D.0.5 s=d→0.90','2s':'GB50217表D.0.5 s=2d→1.00','3t':'GB50217表D.0.5 s=d→0.85','3s':'GB50217表D.0.5 s=2d→0.98'}[n]||''}

function calc(){
  var I=parseFloat(document.getElementById('I').value)||0;
  if(I<=0){document.getElementById('result').innerHTML='';return}
  var h='';
  if(tp==='cu'){
    var div=divMap[ct]||1, Ieq=I/(mf[mt]*cf[cr]*div);
    var sel=null; for(var i=0;i<C.length;i++){var a=cr==='1'?C[i].a1:C[i].a3;if(!sel&&a>=Ieq)sel={r:C[i],amp:a}} if(!sel){var l=C[C.length-1];sel={r:l,amp:cr==='1'?l.a1:l.a3}}
    h+=card('cu-card','🔶 铜电缆',sel.r.s+' mm²',sel.amp+' A',I,Math.round(Ieq),mf[mt]*cf[cr]*div,ct,cr);
    h+=card('al-card','🔘 等效铝电缆',Math.round(sel.r.s*1.6)+' mm²',alA(sel.amp)+' A',I,null,null,ct,cr,'等效');
    refCu(sel.r.s);
  }else if(tp==='al'){
    var div=divMap[ct]||1, Ieq=I/(mf[mt]*cf[cr]*div);
    var sel=null; for(var i=0;i<C.length;i++){var cuA=cr==='1'?C[i].a1:C[i].a3;var alA_=alA(cuA);if(!sel&&alA_>=Ieq)sel={r:C[i],amp:alA_}} if(!sel){var l=C[C.length-1];sel={r:l,amp:alA(cr==='1'?l.a1:l.a3)}}
    h+=card('al-card','🔘 铝电缆',sel.r.s+' mm²',sel.amp+' A',I,Math.round(Ieq),mf[mt]*cf[cr]*div,ct,cr,'主选');
    refAl(sel.r.s);
  }else{
    var sel=null; for(var i=0;i<BB.length;i++){var a_=bb==='open'?BB[i].o:BB[i].c;if(!sel&&a_>=I)sel={b:BB[i],amp:a_}} if(!sel)sel={b:BB[BB.length-1],amp:bb==='open'?BB[BB.length-1].o:BB[BB.length-1].c}
    h+=bbcard(sel.b,sel.amp,I);
    refBb(sel.b.sp);
  }
  document.getElementById('result').innerHTML=h;
}

function card(cls,title,size,amp,I,Ieq,factor,n,core,sub){
  var cnum=cn_(n), dual=cnum>1;
  var mn={air:'空气中',pipe:'穿管',buried:'埋地'},cn={1:'单芯',3:'3芯',4:'4芯',5:'5芯'};
  var rl=(sub?'铝截面≈铜×1.6':cn[core]+' · '+cl(n)+' · '+mn[mt]);
  var cn2=cnote(n);
  return '<div class="result-card '+cls+'"><div class="rh"><span class="rt">'+title+'</span><span class="rl">'+rl+'</span></div>'+
    '<div class="rm"><span class="sz">'+size+'</span><span class="ap">'+(dual?'×'+cnum+'根 ':'')+'载流量 '+amp+'</span></div>'+
    '<div class="ir"><span>输入 <b>'+I+' A</b></span>'+(Ieq?'<span>等效 <b>'+Ieq+' A</b></span>':'')+(factor?'<span>修正 <b>×'+factor.toFixed(2)+'</b></span>':'')+'</div>'+
    (cn2?'<div class="ir" style="border-top:none;padding-top:0">📐 '+cn2+'</div>':'')+'</div>';
}

function bbcard(b,amp,I){
  return '<div class="result-card bb-card"><div class="rh"><span class="rt">🟦 铜排</span><span class="rl">'+(bb==='open'?'户外架空':'户内封闭')+'</span></div>'+
    '<div class="rm"><span class="sz">'+b.sp+'</span><span class="ap">截面 '+b.a+' mm² | '+amp+' A</span></div>'+
    '<div class="ir"><span>输入 <b>'+I+' A</b></span></div></div>';
}

function refCu(hl){
  var r='<table class="ref-table"><thead><tr><th>mm²</th><th>单芯A</th><th>3芯A</th><th>铝3芯A</th><th>铝等效</th></tr></thead><tbody>';
  for(var i=0;i<C.length;i++){var c_=C[i];r+='<tr'+(c_.s===hl?' class="hl"':'')+'><td>'+c_.s+'</td><td>'+c_.a1+'</td><td>'+c_.a3+'</td><td>'+alA(c_.a3)+'</td><td>≈'+Math.round(c_.s*1.6)+'</td></tr>'}
  r+='</tbody></table>';document.getElementById('reftbl').innerHTML=r;
}
function refAl(hl){
  var r='<table class="ref-table"><thead><tr><th>mm²</th><th>铝单芯A</th><th>铝3芯A</th><th>等效铜</th></tr></thead><tbody>';
  for(var i=0;i<C.length;i++){var c_=C[i];r+='<tr'+(c_.s===hl?' class="hl"':'')+'><td>'+c_.s+'</td><td>'+alA(c_.a1)+'</td><td>'+alA(c_.a3)+'</td><td>≈'+Math.round(c_.s/1.6)+'</td></tr>'}
  r+='</tbody></table>';document.getElementById('reftbl').innerHTML=r;
}
function refBb(hl){
  var r='<table class="ref-table"><thead><tr><th>规格</th><th>mm²</th><th>架空A</th><th>封闭A</th></tr></thead><tbody>';
  for(var i=0;i<BB.length;i++){var b_=BB[i];r+='<tr'+(b_.sp===hl?' class="hl"':'')+'><td>'+b_.sp+'</td><td>'+b_.a+'</td><td>'+b_.o+'</td><td>'+b_.c+'</td></tr>'}
  r+='</tbody></table>';document.getElementById('reftbl').innerHTML=r;
}
calc();
</script>
</body>
</html>
